name: TriagePilot
description: Report-only issue and PR triage for open-source maintainers.
inputs:
  mode:
    description: Report mode, either issue or pr.
    required: true
    default: pr
  input:
    description: Path to an issue JSON file when mode is issue.
    required: false
  config:
    description: Path to triagepilot.yml.
    required: false
    default: triagepilot.yml
  base:
    description: Base ref for PR mode.
    required: false
    default: origin/main
  head:
    description: Head ref for PR mode.
    required: false
    default: HEAD
  format:
    description: markdown or json.
    required: false
    default: markdown
  post-comment:
    description: Reserved for future trusted write-capable mode. Must remain false in v0.1.0.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: pnpm
    - shell: bash
      run: pnpm install --frozen-lockfile
    - shell: bash
      run: pnpm build
    - if: ${{ inputs.post-comment != 'false' }}
      shell: bash
      run: |
        echo "TriagePilot v0.1.0 is report-only and does not post comments." >&2
        exit 2
    - if: ${{ inputs.mode == 'issue' }}
      shell: bash
      run: node dist/cli.js issue --input "${{ inputs.input }}" --config "${{ inputs.config }}" --format "${{ inputs.format }}" >> "$GITHUB_STEP_SUMMARY"
    - if: ${{ inputs.mode == 'pr' }}
      shell: bash
      run: node dist/cli.js pr --base "${{ inputs.base }}" --head "${{ inputs.head }}" --config "${{ inputs.config }}" --format "${{ inputs.format }}" >> "$GITHUB_STEP_SUMMARY"
